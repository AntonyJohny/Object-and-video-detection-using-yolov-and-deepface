<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Source</title>
    <style>
        /* --- DARK THEME & LAYOUT --- */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #333;
            --accent-color: #1877f2;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #90caf9; /* Consistent blueish header */
            margin-bottom: 30px;
        }
        
        h3 {
            color: #fff;
            margin-top: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            border-color: #555;
        }

        img {
            width: 100%;
            height: 200px;
            background-color: #000;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        h3 {
            font-size: 1.1rem;
            margin: 10px 0;
        }

        /* Upload Card Specifics */
        .upload-card {
            border: 2px dashed #555;
            justify-content: center;
            background-color: rgba(30, 30, 30, 0.5);
            min-height: 250px; 
        }

        .upload-card:hover {
            border-color: var(--accent-color);
            background-color: rgba(30, 30, 30, 0.8);
        }

        .upload-card p {
            color: #aaa;
            margin-bottom: 20px;
        }

        .upload-btn {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .upload-btn:hover {
            background-color: #1565c0;
        }
    </style>
</head>
<body>
    <h1>Select Input Source</h1>
    <div id="grid" class="grid">
        <!-- Upload Card -->
        <div class="card upload-card">
            <h3>Upload Video File</h3>
            <p>Analyze a pre-recorded video</p>
            <input type="file" id="video-upload" accept="video/*" style="display:none">
            <button class="upload-btn" onclick="document.getElementById('video-upload').click()">Choose File</button>
        </div>
    </div>
    <script>
        // Upload Logic
        document.getElementById('video-upload').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('video', file);
            const btn = document.querySelector('.upload-btn');
            btn.textContent = 'Uploading...';
            
            const res = await fetch('/api/upload_video', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.status === 'success') {
                window.location.href = `/video_analysis/${data.filename}`;
            } else {
                alert('Upload failed');
                btn.textContent = 'Choose File';
            }
        };

        // Existing Camera Logic
        fetch('/api/list_cameras').then(r => r.json()).then(cams => {
            const grid = document.getElementById('grid');
            cams.forEach(cam => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<img src="/camera_preview/${encodeURIComponent(cam.id)}"><h3>${cam.name}</h3>`;
                div.onclick = () => fetch('/api/select_camera', {
                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({source: cam.id})
                }).then(() => window.location.href = '/dashboard');
                grid.appendChild(div);
            });
        });
    </script>
</body>
</html>
