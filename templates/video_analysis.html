<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Analysis - Cinema Mode</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #121212; color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Top Bar */
        .header { padding: 10px 20px; background: #1f1f1f; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .header h2 { margin: 0; font-size: 18px; }
        .back-btn { color: #aaa; text-decoration: none; font-size: 14px; }
        .back-btn:hover { color: white; }

        /* Main Layout */
        .workspace { display: flex; flex: 1; overflow: hidden; }
        
        /* Left: Video Player */
        .video-area { flex: 3; position: relative; display: flex; flex-direction: column; background: #000; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        /* Timeline Overlay */
        .timeline-wrapper { position: absolute; bottom: 60px; left: 20px; right: 20px; height: 30px; background: rgba(0,0,0,0.6); border-radius: 4px; cursor: pointer; }
        .timeline-bar { position: relative; width: 100%; height: 100%; }
        .marker { position: absolute; width: 4px; height: 100%; background: #f44336; opacity: 0.7; transition: transform 0.1s; }
        .marker:hover { transform: scaleY(1.2); background: #ff5252; opacity: 1; z-index: 10; }
        
        /* Right: Controls & List */
        .sidebar { flex: 1; background: #1f1f1f; border-left: 1px solid #333; display: flex; flex-direction: column; min-width: 300px; max-width: 400px; }
        
        .control-panel { padding: 20px; border-bottom: 1px solid #333; }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; padding: 10px; border-radius: 4px; border: 1px solid #444; background: #333; color: white; }
        button { padding: 10px 15px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; cursor: not-allowed; }
        
        .results-list { flex: 1; overflow-y: auto; padding: 0; list-style: none; margin: 0; }
        .result-item { padding: 12px 20px; border-bottom: 1px solid #333; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .result-item:hover { background: #2d2d2d; }
        .timestamp { color: #2196F3; font-family: monospace; font-weight: bold; }
        .confidence { font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Video Analysis</h2>
        <a href="/select_camera" class="back-btn">← Back to Camera Selection</a>
    </div>

    <div class="workspace">
        <div class="video-area">
            <!-- The filename is passed from the backend route -->
            <video id="video-player" controls src="/uploads/{{ filename }}"></video>
            
            <!-- Custom Timeline Overlay -->
            <div id="timeline-container" class="timeline-wrapper" style="display:none;">
                 <div id="timeline-bar" class="timeline-bar"></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="control-panel">
                <p style="margin-top:0; color:#aaa; font-size:14px;">Enter objects to search for (or 'all'):</p>
                <div class="input-group">
                    <input type="text" id="obj-input" placeholder="e.g. person, bag">
                    <button id="analyze-btn">Analyze</button>
                </div>
            </div>
            
            <ul id="results-list" class="results-list">
                <!-- List items go here -->
            </ul>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-player');
        const timelineContainer = document.getElementById('timeline-container');
        const timelineBar = document.getElementById('timeline-bar');
        const resultsList = document.getElementById('results-list');
        const btn = document.getElementById('analyze-btn');
        const filename = "{{ filename }}";

        btn.onclick = async () => {
            const rawInput = document.getElementById('obj-input').value;
            const targets = rawInput.split(',').map(s => s.trim()).filter(s => s);
            
            if(!targets.length) return alert("Please enter objects to detect.");
            
            btn.textContent = "Processing...";
            btn.disabled = true;
            resultsList.innerHTML = '<li class="result-item" style="justify-content:center; color:#888;">Analyzing video... please wait.</li>';

            try {
                const res = await fetch('/api/analyze_video_file', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ filename, targets })
                });
                const data = await res.json();
                
                if (data.error) {
                    alert("Error: " + data.error);
                    resultsList.innerHTML = '';
                } else {
                    renderResults(data);
                }
            } catch (e) {
                console.error(e);
                alert("Analysis failed. Check console for details.");
                resultsList.innerHTML = '';
            } finally {
                btn.textContent = "Analyze";
                btn.disabled = false;
            }
        };

        function renderResults(data) {
            resultsList.innerHTML = '';
            timelineBar.innerHTML = '';
            
            if(!data.length) { 
                resultsList.innerHTML = '<li class="result-item" style="justify-content:center;">No detections found.</li>'; 
                timelineContainer.style.display = 'none';
                return; 
            }

            timelineContainer.style.display = 'block';

            data.forEach(item => {
                // 1. Add List Item
                const li = document.createElement('li');
                li.className = 'result-item';
                li.innerHTML = `
                    <span>${item.object}</span>
                    <div>
                        <span class="confidence">${(item.confidence*100).toFixed(0)}%</span>
                        <span class="timestamp">${formatTime(item.timestamp)}</span>
                    </div>
                `;
                li.onclick = () => video.currentTime = item.timestamp;
                resultsList.appendChild(li);

                // 2. Add Visual Marker
                const marker = document.createElement('div');
                marker.className = 'marker';
                // Position based on time percentage vs total video duration
                // Note: video.duration must be available. If video hasn't loaded metadata, this might be 0/NaN.
                if (video.duration) {
                    const pct = (item.timestamp / video.duration) * 100;
                    marker.style.left = `${pct}%`;
                    marker.title = `${item.object} at ${formatTime(item.timestamp)}`;
                    marker.onclick = (e) => { 
                        e.stopPropagation(); 
                        video.currentTime = item.timestamp; 
                        video.play();
                    };
                    timelineBar.appendChild(marker);
                }
            });
        }

        // Helper to format seconds into MM:SS
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // Click timeline background to seek
        timelineContainer.onclick = (e) => {
            const rect = timelineContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        };
    </script>
</body>
</html>
