<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive AI Sentinel - Dark Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/slim-select/2.8.2/slimselect.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/slim-select/2.8.2/slimselect.min.css" rel="stylesheet">
    <style>
        /* --- DARK THEME & LAYOUT --- */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #333;
            --accent-color: #1877f2;
            --table-header: #2c2c2c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            height: 100vh; /* Fit to screen height */
            box-sizing: border-box;
            overflow: hidden; /* Prevent body scroll, scroll inside cards instead */
            display: flex;
            flex-direction: column;
        }

        h1, h2 { color: #ffffff; margin: 0 0 10px 0; font-size: 1.2rem; }
        h1 { text-align: center; margin-bottom: 15px; font-size: 1.5rem; color: #90caf9; }

        /* Main Layout Grid */
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100%;
            max-width: 1800px;
            margin: 0 auto;
            width: 100%;
        }

        /* Top Row: Controls */
        .controls-row {
            display: flex;
            gap: 15px;
            flex: 0 0 auto; /* Fixed height based on content */
        }

        /* Bottom Row: Video & Logs */
        .content-row {
            display: flex;
            gap: 15px;
            flex: 1; /* Fill remaining height */
            min-height: 0; /* Critical for nested scrolling */
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        /* Video Area */
        #video-container {
            flex: 3; /* Takes 60-70% width */
            min-width: 0; /* Prevent overflow */
            justify-content: center;
            align-items: center;
            background-color: #000;
            border: 1px solid #333;
        }
        #video-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }

        /* Logs Area */
        #logs-column {
            flex: 2; /* Takes 30-40% width */
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 350px;
        }

        .log-container {
            flex: 1; /* Split height equally between two logs */
            min-height: 0; /* Enable scrolling inside */
            overflow: hidden;
        }

        /* Tables */
        .table-wrapper {
            overflow-y: auto;
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: var(--table-header); position: sticky; top: 0; z-index: 1; font-weight: 600; color: #fff; }
        tr:hover { background-color: #2d2d2d; }

        /* Enrollment Section */
        #enrollment-card { display: flex; flex-direction: row; align-items: center; gap: 15px; justify-content: space-between;}
        #capture-preview-container {
            display: none;
            align-items: center;
            gap: 10px;
            background-color: #2d2d2d;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #444;
        }
        #capture-preview-container img { height: 50px; width: 50px; object-fit: cover; border-radius: 4px; }
        
        /* Inputs & Buttons */
        input { background-color: #333; border: 1px solid #555; color: white; padding: 8px; border-radius: 4px; }
        
        button {
            padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; border: none; transition: 0.2s;
        }
        .capture-btn { background-color: #2e7d32; color: white; }
        .capture-btn:hover { background-color: #1b5e20; }
        .attendance-btn { background-color: #1565c0; color: white; font-size: 0.8em;}
        .attendance-btn:hover { background-color: #0d47a1; }
        .enroll-btn { background-color: var(--accent-color); color: white; }
        .switch-camera-btn { background-color: #f57f17; color: white; margin-left: 10px;}
        .switch-camera-btn:hover { background-color: #f9a825; }

        /* Slim Select Dark Theme Overrides */
        .ss-main { background-color: #333 !important; color: #fff !important; border-color: #555 !important; }
        .ss-content { background-color: #333 !important; color: #fff !important; border-color: #555 !important; }
        .ss-list .ss-option { color: #fff !important; }
        .ss-list .ss-option:hover { background-color: #444 !important; }
        .ss-values .ss-value { background-color: #444 !important; color: #fff !important; }
        .ss-search input { background-color: #333 !important; color: white !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interactive AI Sentinel</h1>

        <!-- Top Row: Controls -->
        <div class="controls-row">
            <div id="controls-card" class="card" style="flex: 1;">
                <h2>Objects to Track</h2>
                <div style="display: flex; align-items: center;">
                    <div style="flex: 1;">
                        <select id="object-select" multiple></select>
                    </div>
                    <button id="switch-camera-btn" class="switch-camera-btn">Switch Camera</button>
                </div>
            </div>
            <div id="enrollment-card" class="card" style="flex: 1;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <h2>Enrollment</h2>
                    <button id="capture-button" class="capture-btn">Capture Face</button>
                </div>
                <div id="capture-preview-container">
                    <!-- Captured image and form will be inserted here -->
                </div>
            </div>
        </div>
        
        <!-- Bottom Row: Video & Logs -->
        <div class="content-row">
            <div id="video-container" class="card">
                <img src="/video_feed" alt="Live Video Feed">
            </div>
            
            <div id="logs-column">
                <!-- Person Log -->
                <div class="card log-container">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                        <h2>Person / Attendance</h2>
                        <button id="attendance-report-btn" class="attendance-btn">Report</button>
                    </div>
                    <div class="table-wrapper">
                        <table id="person-log-table">
                            <thead><tr><th>Time</th><th>Event</th><th>Name</th><th>Conf</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <!-- Object Log -->
                <div class="card log-container">
                    <h2>Object Detections</h2>
                    <div class="table-wrapper">
                        <table id="object-log-table">
                            <thead><tr><th>Time</th><th>Event</th><th>Object</th><th>Conf</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const personLogTableBody = document.querySelector('#person-log-table tbody');
            const objectLogTableBody = document.querySelector('#object-log-table tbody');
            const captureButton = document.getElementById('capture-button');
            const capturePreviewContainer = document.getElementById('capture-preview-container');
            const attendanceBtn = document.getElementById('attendance-report-btn');
            const switchCameraBtn = document.getElementById('switch-camera-btn');
            let slimSelect;

            // --- API Functions ---
            async function updateTrackedObjects() {
                const selectedObjects = slimSelect.getSelected();
                try {
                    await fetch('/update_objects', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ objects: selectedObjects }),
                    });
                } catch (error) { console.error("Error updating tracked objects:", error); }
            }

            async function populateObjectList() {
                try {
                    const response = await fetch('/get_objects');
                    const objects = await response.json();
                    const selectOptions = objects.map(name => ({ text: name, value: name }));
                    
                    // Add "All" option
                    selectOptions.push({ text: 'All Objects', value: 'all', style: 'color: #ff8a80; font-weight:bold;' });

                    slimSelect = new SlimSelect({
                        select: '#object-select',
                        data: selectOptions,
                        settings: { placeholderText: 'Select objects...', searchPlaceholder: 'Search objects...' },
                        events: { afterChange: updateTrackedObjects }
                    });
                } catch (error) { console.error("Error fetching object list:", error); }
            }

            async function fetchAndRenderLogs(url, tableBody, columns) {
                try {
                    const response = await fetch(url);
                    const logs = await response.json();
                    tableBody.innerHTML = '';
                    logs.forEach(log => {
                        const row = document.createElement('tr');
                        columns.forEach(col => {
                            const cell = document.createElement('td');
                            cell.textContent = log[col] || 'N/A';
                            row.appendChild(cell);
                        });
                        tableBody.prepend(row);
                    });
                } catch (error) { console.error(`Error fetching logs from ${url}:`, error); }
            }

            // --- Enrollment Logic ---
            captureButton.addEventListener('click', async () => {
                captureButton.textContent = '...';
                captureButton.disabled = true;
                try {
                    const response = await fetch('/api/capture_frame', { method: 'POST' });
                    const result = await response.json();
                    if (result.status === 'success') {
                        displayEnrollmentForm(result.filename);
                    } else {
                        alert(`Capture failed: ${result.message}`);
                    }
                } catch (error) { alert('Error capturing frame.'); } 
                finally {
                    captureButton.textContent = 'Capture Face';
                    captureButton.disabled = false;
                }
            });

            function displayEnrollmentForm(filename) {
                capturePreviewContainer.innerHTML = '';
                capturePreviewContainer.style.display = 'flex';

                const img = document.createElement('img');
                img.src = `/unknown_snapshots/${filename}`;

                const nameInput = document.createElement('input');
                nameInput.type = 'text';
                nameInput.placeholder = 'Name';
                nameInput.style.width = '120px';

                const enrollButton = document.createElement('button');
                enrollButton.textContent = 'Enroll';
                enrollButton.className = 'enroll-btn';
                
                enrollButton.onclick = async () => {
                    const name = nameInput.value.trim();
                    if (!name) return alert('Enter a name.');
                    
                    enrollButton.textContent = '...';
                    try {
                        const res = await fetch('/api/enroll_new_person', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ name: name, filename: filename }),
                        });
                        const result = await res.json();
                        alert(result.message);
                        if(result.status === 'success') capturePreviewContainer.style.display = 'none';
                    } catch (e) { alert('Error enrolling.'); }
                    finally { enrollButton.textContent = 'Enroll'; }
                };

                capturePreviewContainer.appendChild(img);
                capturePreviewContainer.appendChild(nameInput);
                capturePreviewContainer.appendChild(enrollButton);
            }
            
            attendanceBtn.addEventListener('click', () => window.open('/attendance', '_blank'));

            switchCameraBtn.addEventListener('click', async () => {
                try {
                    await fetch('/api/reset_camera', { method: 'POST' });
                    window.location.href = '/';
                } catch (error) { window.location.href = '/'; }
            });

            // --- Startup ---
            populateObjectList();
            setInterval(() => {
                fetchAndRenderLogs('/api/get_person_logs', personLogTableBody, ['Timestamp', 'Event', 'Name', 'Confidence']);
                fetchAndRenderLogs('/api/get_object_logs', objectLogTableBody, ['Timestamp', 'Event', 'Object', 'Confidence']);
            }, 3000);
        });
    </script>
</body>
</html>
